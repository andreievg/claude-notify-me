name: topic-from-issue

# Open an issue with the "Topic" form (auto-labelled `topic`). This puts the new/edited
# topic on a branch and opens a PR (it does NOT go live until the PR is merged), then
# generates a preview page for it.
on:
  issues:
    types: [opened, edited, labeled]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write
  pages: write

concurrency:
  group: topic-issue-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  open-pr:
    if: contains(github.event.issue.labels.*.name, 'topic')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      branch: ${{ steps.pr.outputs.branch }}
      pr_number: ${{ steps.pr.outputs.pr_number }}
      has_pr: ${{ steps.pr.outputs.has_pr }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BR="topic/issue-${{ github.event.issue.number }}"
          git fetch -q origin "$BR" || true
          if git rev-parse --verify "origin/$BR" >/dev/null 2>&1; then
            git checkout -B "$BR" "origin/$BR"
          else
            git checkout -B "$BR"
          fi
          echo "BRANCH=$BR" >> "$GITHUB_ENV"

      - name: Save issue content
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          printf '%s\n' "$ISSUE_TITLE" > issue-title.txt
          printf '%s'   "$ISSUE_BODY"  > issue-body.md

      - name: Build/update the topic file
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            A GitHub issue labeled 'topic' was opened or edited. Its title is in
            ./issue-title.txt and its body (a filled-in topic form) is in ./issue-body.md.
            Read prompts/topics/_TEMPLATE.md and prompts/base.md for the required format.
            From the issue, determine the topic `id` (kebab-case) and whether this is an ADD
            or EDIT, then create or update prompts/topics/<id>.md to match the template
            exactly (front-matter + What to track + Summarization criteria + Severity rubric,
            plus a Keynote section if the issue provides one). For an EDIT, preserve content
            the issue didn't change. Defaults: lookback_days 3, max_items 8. Only
            create/modify that one file under prompts/topics/. Do not edit anything else.
          claude_args: >-
            --allowedTools "Read,Edit,Write"
            --model claude-sonnet-4-6
            --max-turns 20

      - name: Commit topic to branch + open PR
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          rm -f issue-title.txt issue-body.md
          git config user.name "news-tracker[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add prompts/topics/
          if ! git diff --cached --quiet; then
            git commit -m "topic: from issue #${{ github.event.issue.number }}"
            git push "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" "HEAD:$BRANCH"
          fi
          # Need at least one commit difference from main to have a PR.
          if [ -z "$(git rev-list "origin/main..$BRANCH" 2>/dev/null)" ] && \
             [ -z "$(git rev-list "origin/main..HEAD" 2>/dev/null)" ]; then
            echo "No topic content yet — no PR."
            echo "has_pr=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          if ! gh pr view "$BRANCH" >/dev/null 2>&1; then
            gh pr create --base main --head "$BRANCH" --label topic \
              --title "${{ github.event.issue.title }}" \
              --body "Topic PR from #${{ github.event.issue.number }}. Merging adds it to the 3×/day rotation. A preview is posted below; comment to refine it."
            gh issue comment "${{ github.event.issue.number }}" \
              --body "🔧 Opened a PR for this topic: $(gh pr view "$BRANCH" --json url --jq .url) — review the preview there before merging."
          fi
          {
            echo "branch=$BRANCH"
            echo "pr_number=$(gh pr view "$BRANCH" --json number --jq .number)"
            echo "has_pr=true"
          } >> "$GITHUB_OUTPUT"

  preview:
    needs: open-pr
    if: needs.open-pr.outputs.has_pr == 'true'
    uses: ./.github/workflows/preview-topic.yml
    with:
      branch: ${{ needs.open-pr.outputs.branch }}
      pr_number: ${{ needs.open-pr.outputs.pr_number }}
    secrets: inherit
